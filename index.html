<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CalCurrency - Organized & Updated Edition</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0e13;
    --surface: #141722;
    --surface2: #1c1f30;
    --border: #2a2f4a;
    --border-dim: #22263a;
    --green: #4ade80;
    --green-dim: #166534;
    --green-glow: rgba(74, 222, 128, 0.08);
    --text: #e2e8f0;
    --muted: #64748b;
    --accent: #38bdf8;
    --red: #f87171;
    --cell-w: 125px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
  body {
    background: var(--bg); color: var(--text); font-family: 'Sarabun', sans-serif;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 3rem 2rem;
  }
  h1 {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; letter-spacing: 0.35em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 3rem; display: flex; align-items: center; gap: 1rem;
  }
  h1::before, h1::after { content: ''; display: block; height: 1px; width: 50px; background: var(--border); }
  .sheet {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
    box-shadow: 0 0 70px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.03) inset;
    width: 100%; max-width: 900px; margin-bottom: 2rem;
  }
  .sheet-bar { background: var(--surface2); border-bottom: 1px solid var(--border); padding: 0.6rem 1.2rem; display: flex; align-items: center; justify-content: space-between; gap: 0.6rem; }
  .sheet-bar-left { display: flex; align-items: center; gap: 0.6rem; flex-grow: 1; }
  .sheet-bar-right { display: flex; align-items: center; gap: 0.6rem; }
  .dot { width: 11px; height: 11px; border-radius: 50%; }
  .dot-g { background: var(--green); }
  .sheet-name { font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; color: #a1a1aa; letter-spacing: 0.12em; font-weight: 600; text-transform: none; text-align: center; flex-grow: 1; }
  table { border-collapse: collapse; font-family: 'IBM Plex Mono', monospace; font-size: 0.85rem; width: 100%; table-layout: fixed; }
  td, th { border-right: 1px solid var(--border-dim); border-bottom: 1px solid var(--border-dim); min-width: var(--cell-w); height: 42px; padding: 0; position: relative; }
  th:last-child, td:last-child { border-right: none; }
  .label-cell { text-align: center; padding: 0.5rem 0.8rem; color: var(--muted); font-size: 0.75rem; letter-spacing: 0.06em; white-space: nowrap; font-family: 'Sarabun', sans-serif; }
  .input-cell { background: var(--green-glow); }
  .input-cell input, .name-cell input {
    width: 100%; height: 100%; background: transparent; border: none; outline: none;
    color: var(--green); font-family: 'IBM Plex Mono', monospace; font-size: 0.9rem; font-weight: 600; text-align: center; padding: 0 0.6rem;
  }
  .name-cell input { color: var(--text); font-family: 'Sarabun', sans-serif; font-size: 0.88rem; font-weight: 400; text-align: left; padding: 0 1rem; }
  .output-cell { text-align: center; padding: 0 0.6rem; color: var(--accent); font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; height: 100%; }
  .output-cell.error { color: var(--red); font-size: 0.68rem; }
  .output-cell.zero { color: #4b5563; }
  .output-cell.copyable, .sum-value.copyable { cursor: pointer; transition: color 0.15s; }
  .output-cell.copyable:hover, .sum-value:hover { color: var(--green); text-shadow: 0 0 10px rgba(74, 222, 128, 0.4); }
  .bulk-header { background: var(--surface2); color: var(--muted); font-size: 0.72rem; text-align: center; padding: 0.5rem 0.6rem; font-family: 'Sarabun', sans-serif; letter-spacing: 0.02em; }
  .sum-row td { background: var(--surface2); border-bottom: none; }
  .sum-label { color: #a1a1aa; font-size: 0.75rem; text-align: right; padding: 0 1.2rem; font-family: 'Sarabun', sans-serif; font-weight: 600; }
  .sum-value { text-align: center; color: var(--green); font-weight: 700; font-size: 0.95rem; display: flex; align-items: center; justify-content: center; height: 100%; }
  
  /* Adjusted Rounds Bar for Header */
  .rounds-label { font-family: 'Sarabun', sans-serif; font-size: 0.7rem; color: var(--muted); font-weight: 600; }
  .rounds-input-wrap { background: rgba(0,0,0,0.2); border: 1px solid var(--border-dim); border-radius: 6px; height: 32px; width: 70px; }
  .rounds-input-wrap input { width: 100%; height: 100%; background: transparent; border: none; outline: none; color: var(--green); text-align: center; font-weight: 700; font-size: 0.9rem; font-family: 'IBM Plex Mono', monospace; }
  .rounds-input-wrap:focus-within { border-color: var(--green); box-shadow: 0 0 8px var(--green-glow); }

  .version-footer { margin-top: auto; padding-top: 3rem; font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; color: var(--muted); opacity: 0.4; letter-spacing: 0.05em; text-align: center; }
</style>
</head>
<body>

<h1>CalCurrency</h1>

<div class="sheet">
  <div class="sheet-bar">
    <div class="sheet-bar-left"><div class="dot dot-g"></div></div>
    <span class="sheet-name">CalCurrency</span>
    <div class="sheet-bar-right"></div>
  </div>
  <table>
    <colgroup>
      <col style="width: 25%;">
      <col style="width: 25%;">
      <col style="width: 25%;">
      <col style="width: 25%;">
    </colgroup>
    <tbody>
      <tr>
        <td><div class="label-cell">จำนวน</div></td>
        <td><div class="label-cell">ราคา</div></td>
        <td><div class="label-cell">ราคา (C)</div></td>
        <td><div class="label-cell">จำนวนที่ได้</div></td>
      </tr>
      <tr>
        <td class="input-cell"><input id="b4" type="number" min="0" placeholder="0"></td>
        <td class="input-cell"><input id="c4" type="text" placeholder="เช่น 2.5 หรือ 1/5"></td>
        <td><div class="output-cell zero" id="d4">—</div></td>
        <td><div class="output-cell zero" id="e4">—</div></td>
      </tr>
    </tbody>
  </table>
</div>

<div class="sheet" style="margin-top: 1.5rem;">
  <div class="sheet-bar">
    <div class="sheet-bar-left"><div class="dot dot-g"></div></div>
    <span class="sheet-name">Bulk Calculator</span>
    <div class="sheet-bar-right">
      <span class="rounds-label">จำนวนรอบ</span>
      <div class="rounds-input-wrap"><input id="global-rounds" type="number" min="0" placeholder="0"></div>
    </div>
  </div>
  <table>
    <colgroup>
      <col style="width: 35%;">
      <col style="width: 15%;">
      <col style="width: 15%;">
      <col style="width: 10%;">
      <col style="width: 15%;">
      <col style="width: 10%;">
    </colgroup>
    <thead>
      <tr>
        <th class="bulk-header" style="text-align:left; padding-left:1rem;">ชื่อ</th>
        <th class="bulk-header">ราคา/ชิ้น</th>
        <th class="bulk-header">มีอยู่แล้ว</th>
        <th class="bulk-header">จำนวน/รอบ</th>
        <th class="bulk-header">จำนวนที่ต้องใช้</th>
        <th class="bulk-header">ราคา (C)</th>
      </tr>
    </thead>
    <tbody id="bulk-body"></tbody>
    <tfoot>
      <tr class="sum-row">
        <td colspan="5" class="sum-label">รวมราคา (C) ทั้งหมด</td>
        <td><div class="sum-value" id="sum-c">—</div></td>
      </tr>
    </tfoot>
  </table>
</div>

<div class="version-footer" id="version-footer">v1.2 (Organized) · 26/03/2026</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = { databaseURL: "https://calcurrency-a1d74-default-rtdb.asia-southeast1.firebasedatabase.app/" };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const calRef = ref(db, 'calcurrency_data');

  /* Logic Helpers */
  const numRe = /^\d+(\.\d+)?$/;
  const fracRe = /^(\d+(?:\.\d+)?)\/(\d+(?:\.\d+)?)$/;
  const isWhole = (n) => Math.abs(n - Math.round(n)) < 0.001;

  function compute(maxQty, priceStr) {
    const s = String(priceStr).trim();
    const b = Math.floor(parseFloat(maxQty));
    if (!s || s === '0' || isNaN(b) || b <= 0) return { price: 0, qty: 0 };
    if (numRe.test(s)) {
      const p = parseFloat(s);
      for (let q = b; q >= 0; q--) if (isWhole(q * p)) return { price: Math.round(q * p), qty: q };
      return { price: 0, qty: 0 };
    }
    if (fracRe.test(s)) {
      const m = s.match(fracRe), num = parseFloat(m[1]), den = parseFloat(m[2]);
      if (den === 0) return { error: 'หารด้วยศูนย์ไม่ได้' };
      for (let q = b; q >= 0; q--) {
        const v = (q * num) / den;
        if (isWhole(v)) return { price: Math.round(v), qty: q };
      }
      return { price: 0, qty: 0 };
    }
    return { error: 'รูปแบบราคาไม่ถูกต้อง' };
  }

  function computeUp(minQty, priceStr) {
    const s = String(priceStr).trim();
    const b = Math.ceil(parseFloat(minQty));
    if (!s || s === '0' || isNaN(b) || b <= 0) return { price: 0, qty: 0 };
    if (numRe.test(s)) {
      const p = parseFloat(s);
      for (let q = b; q <= b + 100000; q++) if (isWhole(q * p)) return { price: Math.round(q * p), qty: q };
    }
    if (fracRe.test(s)) {
      const m = s.match(fracRe), num = parseFloat(m[1]), den = parseFloat(m[2]);
      for (let q = b; q <= b + 100000; q++) {
        const v = (q * num) / den;
        if (isWhole(v)) return { price: Math.round(v), qty: q };
      }
    }
    return { price: 0, qty: 0 };
  }

  function applyCell(el, val) {
    const isErr = typeof val === 'string';
    const isZero = val === 0;
    el.dataset.raw = isErr ? '' : String(val);
    el.textContent = isErr ? val : (isZero ? '—' : val.toLocaleString());
    el.className = 'output-cell' + (isErr ? ' error' : isZero ? ' zero' : ' copyable');
  }

  /* Table UI */
  const b4 = document.getElementById('b4'), c4 = document.getElementById('c4'), d4 = document.getElementById('d4'), e4 = document.getElementById('e4');
  const body = document.getElementById('bulk-body'), roundsInput = document.getElementById('global-rounds'), sumCEl = document.getElementById('sum-c');
  const ROWS = 6;

  for (let i = 0; i < ROWS; i++) {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="name-cell"><input type="text" data-row="${i}" data-col="name" placeholder="รายการ ${i+1}"></td>
      <td class="input-cell"><input type="text" data-row="${i}" data-col="price" placeholder="0"></td>
      <td class="input-cell"><input type="number" data-row="${i}" data-col="stock" placeholder="0"></td>
      <td class="input-cell"><input type="number" step="any" data-row="${i}" data-col="mult" placeholder="1"></td>
      <td><div class="output-cell zero" data-row="${i}" data-out="qty">—</div></td>
      <td><div class="output-cell zero" data-row="${i}" data-out="total">—</div></td>`;
    body.appendChild(tr);
  }

  function calcAll() {
    const r1 = compute(b4.value, c4.value);
    applyCell(d4, r1.error || r1.price); applyCell(e4, r1.error || r1.qty);
    const rounds = parseFloat(roundsInput.value) || 0;
    let totalC = 0;
    for (let i = 0; i < ROWS; i++) {
      const pStr = body.querySelector(`[data-row="${i}"][data-col="price"]`).value;
      const stock = parseFloat(body.querySelector(`[data-row="${i}"][data-col="stock"]`).value) || 0;
      const multRaw = body.querySelector(`[data-row="${i}"][data-col="mult"]`).value;
      const mult = parseFloat(multRaw) || (multRaw === '0' ? 0 : 1);
      const qtyEl = body.querySelector(`[data-row="${i}"][data-out="qty"]`), totalEl = body.querySelector(`[data-row="${i}"][data-out="total"]`);
      const rawQty = Math.max(0, (rounds * mult) - stock);
      if (!pStr.trim()) { applyCell(qtyEl, 0); applyCell(totalEl, 0); }
      else {
        const res = computeUp(rawQty, pStr);
        applyCell(qtyEl, res.qty); applyCell(totalEl, res.price);
        totalC += res.price;
      }
    }
    sumCEl.dataset.raw = String(totalC);
    sumCEl.textContent = totalC === 0 ? '—' : totalC.toLocaleString();
    sumCEl.className = 'sum-value' + (totalC > 0 ? ' copyable' : '');
  }

  let isUpdating = false;
  function saveToFirebase() {
    if (isUpdating) return;
    const data = {
      b4: b4.value, c4: c4.value, rounds: roundsInput.value,
      rows: Array.from({length: ROWS}, (_, i) => ({
        name: body.querySelector(`[data-row="${i}"][data-col="name"]`).value,
        price: body.querySelector(`[data-row="${i}"][data-col="price"]`).value,
        stock: body.querySelector(`[data-row="${i}"][data-col="stock"]`).value,
        mult: body.querySelector(`[data-row="${i}"][data-col="mult"]`).value,
      }))
    };
    set(calRef, data);
  }

  onValue(calRef, (snap) => {
    isUpdating = true;
    const data = snap.val();
    if (data) {
      b4.value = data.b4 || ''; c4.value = data.c4 || ''; roundsInput.value = data.rounds || '';
      data.rows?.forEach((r, i) => {
        if (i < ROWS) {
          body.querySelector(`[data-row="${i}"][data-col="name"]`).value = r.name || '';
          body.querySelector(`[data-row="${i}"][data-col="price"]`).value = r.price || '';
          body.querySelector(`[data-row="${i}"][data-col="stock"]`).value = r.stock || '';
          body.querySelector(`[data-row="${i}"][data-col="mult"]`).value = r.mult || '';
        }
      });
    }
    calcAll();
    isUpdating = false;
  });

  document.addEventListener('input', (e) => {
    if (e.target.tagName === 'INPUT') {
      calcAll();
      saveToFirebase();
    }
  });
  
  document.addEventListener('click', e => {
    const el = e.target.closest('.copyable');
    if (el && el.dataset.raw) navigator.clipboard.writeText(el.dataset.raw);
  });

  // Time Footer Logic
  const footerEl = document.getElementById('version-footer');
  const now = new Date();
  const timeStr = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', hour12: false });
  footerEl.textContent = `v1.2 (Organized) · 26/03/2026 ${timeStr}`;
</script>
</body>
</html>
