<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CalCurrency</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a; --border: #2e3350;
    --green: #4ade80; --green-dim: #166534; --green-glow: rgba(74, 222, 128, 0.15);
    --red: #f87171; --text: #e2e8f0; --muted: #64748b; --accent: #38bdf8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Sarabun', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 2rem; }
  
  /* จัดการ Header ให้ชื่ออยู่ตรงกลางเป๊ะ */
  .sheet-bar {
    background: var(--surface2); border-bottom: 1px solid var(--border);
    padding: 0.5rem 1rem; display: flex; align-items: center; position: relative; min-height: 42px;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #4ade80; z-index: 2; }
  .sheet-name {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; color: var(--muted);
    position: absolute; left: 0; right: 0; text-align: center; pointer-events: none;
    letter-spacing: 0.12em; font-weight: 600; text-transform: uppercase;
  }
  .sheet-bar-right { margin-left: auto; z-index: 2; display: flex; align-items: center; gap: 0.75rem; }

  /* Style อื่นๆ คงไว้ตามต้นฉบับของคุณ */
  .sheet { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; width: 100%; max-width: 900px; margin-bottom: 1.5rem; }
  table { border-collapse: collapse; font-family: 'IBM Plex Mono', monospace; font-size: 0.82rem; width: 100%; }
  td, th { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); height: 38px; text-align: center; }
  .input-cell { background: var(--green-glow); }
  .input-cell input { width: 100%; height: 100%; background: transparent; border: none; outline: none; color: var(--green); text-align: center; font-weight: 600; }
  .output-cell { color: var(--accent); font-weight: 600; }
  .rounds-label { font-size: 0.68rem; color: var(--muted); }
  .rounds-input-wrap { background: var(--green-glow); border: 1px solid var(--border); border-radius: 6px; width: 70px; height: 30px; }
  .rounds-input-wrap input { width: 100%; height: 100%; background: transparent; border: none; outline: none; color: var(--green); text-align: center; font-weight: 700; }
  .version-footer { margin-top: 2rem; font-family: 'IBM Plex Mono', monospace; font-size: 0.62rem; color: var(--muted); opacity: 0.5; }
</style>
</head>
<body>

<h1>CalCurrency</h1>

<div class="sheet">
  <div class="sheet-bar">
    <div class="dot"></div>
    <span class="sheet-name">CalCurrency</span>
  </div>
  <table>
    <tr>
      <td><div style="font-size:0.7rem; color:var(--muted)">จำนวน</div></td>
      <td><div style="font-size:0.7rem; color:var(--muted)">ราคา</div></td>
      <td><div style="font-size:0.7rem; color:var(--muted)">ราคา (C)</div></td>
      <td><div style="font-size:0.7rem; color:var(--muted)">จำนวนที่ได้</div></td>
    </tr>
    <tr>
      <td class="input-cell"><input id="b4" type="number" placeholder="0"></td>
      <td class="input-cell"><input id="c4" type="text" placeholder="0"></td>
      <td><div class="output-cell" id="d4">—</div></td>
      <td><div class="output-cell" id="e4">—</div></td>
    </tr>
  </table>
</div>

<div class="sheet">
  <div class="sheet-bar">
    <div class="dot"></div>
    <span class="sheet-name">Bulk Calculator</span>
    <div class="sheet-bar-right">
      <span class="rounds-label">จำนวนรอบ</span>
      <div class="rounds-input-wrap"><input id="global-rounds" type="number" placeholder="0"></div>
    </div>
  </div>
  <table id="bulk-table">
    </table>
</div>

<div class="version-footer">v1.2 (Organized) · {{COMMIT_DATE}}</div>

<script>
  // ใส่ Logic การคำนวณและ localStorage เดิมของคุณที่นี่
  // อย่าลืมว่าตัวแปร {{COMMIT_DATE}} จะถูกแทนที่โดย GitHub Actions เมื่อมีการ Deploy ครับ
</script>
</body>
</html>
