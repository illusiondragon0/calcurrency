<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CalCurrency - Firebase Edition</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --green: #4ade80;
    --green-dim: #166534;
    --green-glow: rgba(74, 222, 128, 0.15);
    --red-glow: rgba(248, 113, 113, 0.13);
    --red: #f87171;
    --text: #e2e8f0;
    --muted: #64748b;
    --accent: #38bdf8;
    --cell-w: 120px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
  body {
    background: var(--bg); color: var(--text); font-family: 'Sarabun', sans-serif;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem;
  }
  h1 {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 2.5rem; display: flex; align-items: center; gap: 0.75rem;
  }
  h1::before, h1::after { content: ''; display: block; height: 1px; width: 40px; background: var(--border); }
  .sheet {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
    box-shadow: 0 0 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04) inset;
  }
  .sheet-bar { background: var(--surface2); border-bottom: 1px solid var(--border); padding: 0.5rem 1rem; display: flex; align-items: center; gap: 0.5rem; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-r { background: #f87171; } .dot-y { background: #fbbf24; } .dot-g { background: #4ade80; }
  .sheet-name { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; color: var(--muted); margin-left: auto; margin-right: auto; letter-spacing: 0.1em; }
  table { border-collapse: collapse; font-family: 'IBM Plex Mono', monospace; font-size: 0.82rem; }
  td, th { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); min-width: var(--cell-w); height: 38px; padding: 0; position: relative; }
  .label-cell { text-align: center; padding: 0.4rem 0.75rem; color: var(--muted); font-size: 0.72rem; letter-spacing: 0.05em; white-space: nowrap; }
  .input-cell { background: var(--green-glow); }
  .input-cell input, .red-cell input {
    width: 100%; height: 100%; background: transparent; border: none; outline: none;
    color: var(--green); font-family: 'IBM Plex Mono', monospace; font-size: 0.88rem; font-weight: 600; text-align: center; padding: 0 0.5rem;
  }
  .name-cell input { width: 100%; height: 100%; background: transparent; border: none; outline: none; color: var(--text); font-family: 'Sarabun', sans-serif; font-size: 0.85rem; padding: 0 0.75rem; }
  .output-cell { text-align: center; padding: 0 0.5rem; color: var(--accent); font-weight: 600; font-size: 0.88rem; display: flex; align-items: center; justify-content: center; height: 100%; }
  .output-cell.error { color: var(--red); font-size: 0.65rem; }
  .output-cell.zero { color: var(--muted); }
  .output-cell.copyable, .sum-value.copyable { cursor: pointer; }
  .output-cell.copyable:hover, .sum-value:hover { color: var(--green); }
  .bulk-header { background: var(--surface2); color: var(--muted); font-size: 0.7rem; text-align: center; padding: 0.35rem 0.5rem; }
  .sum-row td { background: var(--surface2); }
  .sum-label { color: var(--muted); font-size: 0.68rem; text-align: right; padding: 0 0.75rem; }
  .sum-value { text-align: center; color: var(--green); font-weight: 700; font-size: 0.92rem; display: flex; align-items: center; justify-content: center; height: 100%; }
  .rounds-bar { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.6rem; }
  .rounds-label { font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem; color: var(--muted); }
  .rounds-input-wrap { background: var(--green-glow); border: 1px solid var(--border); border-radius: 6px; height: 36px; width: 90px; }
  .rounds-input-wrap input { width: 100%; height: 100%; background: transparent; border: none; outline: none; color: var(--green); text-align: center; font-weight: 700; }
  .hint { margin-top: 1.25rem; font-size: 0.72rem; color: var(--muted); display: flex; gap: 1.5rem; justify-content: center; }
  .swatch { width: 10px; height: 10px; border-radius: 2px; display: inline-block; margin-right: 4px; }
  .swatch-green { background: var(--green); } .swatch-blue { background: var(--accent); }
  .version-footer { margin-top: 2rem; font-family: 'IBM Plex Mono', monospace; font-size: 0.62rem; color: var(--muted); opacity: 0.5; }
</style>
</head>
<body>

<h1>CalCurrency</h1>

<div class="sheet">
  <div class="sheet-bar"><div class="dot dot-g"></div><span class="sheet-name">calcurrency</span></div>
  <table>
    <tbody>
      <tr>
        <td><div class="label-cell">จำนวน</div></td>
        <td><div class="label-cell">ราคา</div></td>
        <td><div class="label-cell">ราคา</div></td>
        <td><div class="label-cell">จำนวน</div></td>
      </tr>
      <tr>
        <td class="input-cell"><input id="b4" type="number" min="0" placeholder="0"></td>
        <td class="input-cell"><input id="c4" type="text" placeholder="เช่น 2.5 หรือ 1/5"></td>
        <td><div class="output-cell zero" id="d4">—</div></td>
        <td><div class="output-cell zero" id="e4">—</div></td>
      </tr>
    </tbody>
  </table>
</div>

<div class="rounds-bar" style="margin-top: 2rem;">
  <span class="rounds-label">จำนวนรอบ</span>
  <div class="rounds-input-wrap"><input id="global-rounds" type="number" min="0" placeholder="0"></div>
</div>

<div class="sheet">
  <div class="sheet-bar"><div class="dot dot-g"></div><span class="sheet-name">bulk calculator</span></div>
  <table>
    <thead>
      <tr>
        <th class="bulk-header" style="min-width:285px; text-align:left; padding-left:0.75rem;">ชื่อ</th>
        <th class="bulk-header">ราคา/ชิ้น</th>
        <th class="bulk-header">มีอยู่แล้ว</th>
        <th class="bulk-header" style="min-width:60px;">จำนวน/รอบ</th>
        <th class="bulk-header">จำนวน</th>
        <th class="bulk-header">C</th>
      </tr>
    </thead>
    <tbody id="bulk-body"></tbody>
    <tfoot>
      <tr class="sum-row">
        <td colspan="5" class="sum-label">รวม C ทั้งหมด</td>
        <td><div class="sum-value" id="sum-c">—</div></td>
      </tr>
    </tfoot>
  </table>
</div>

<div class="version-footer">v1.1 (Firebase) · 26/03/2026</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = { databaseURL: "https://calcurrency-a1d74-default-rtdb.asia-southeast1.firebasedatabase.app/" };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const calRef = ref(db, 'calcurrency_data');

  /* Logic Helpers */
  const numRe = /^\d+(\.\d+)?$/;
  const fracRe = /^(\d+(?:\.\d+)?)\/(\d+(?:\.\d+)?)$/;
  const isWhole = (n) => Math.abs(n - Math.round(n)) < 0.001;

  function compute(maxQty, priceStr) {
    const s = String(priceStr).trim();
    const b = Math.floor(parseFloat(maxQty));
    if (!s || s === '0' || isNaN(b) || b <= 0) return { price: 0, qty: 0 };
    if (numRe.test(s)) {
      const p = parseFloat(s);
      for (let q = b; q >= 0; q--) if (isWhole(q * p)) return { price: Math.round(q * p), qty: q };
      return { price: 0, qty: 0 };
    }
    if (fracRe.test(s)) {
      const m = s.match(fracRe), num = parseFloat(m[1]), den = parseFloat(m[2]);
      if (den === 0) return { error: 'หารด้วยศูนย์ไม่ได้' };
      for (let q = b; q >= 0; q--) {
        const v = (q * num) / den;
        if (isWhole(v)) return { price: Math.round(v), qty: q };
      }
      return { price: 0, qty: 0 };
    }
    return { error: 'รูปแบบราคาไม่ถูกต้อง' };
  }

  function computeUp(minQty, priceStr) {
    const s = String(priceStr).trim();
    const b = Math.ceil(parseFloat(minQty));
    if (!s || s === '0' || isNaN(b) || b <= 0) return { price: 0, qty: 0 };
    if (numRe.test(s)) {
      const p = parseFloat(s);
      for (let q = b; q <= b + 100000; q++) if (isWhole(q * p)) return { price: Math.round(q * p), qty: q };
    }
    if (fracRe.test(s)) {
      const m = s.match(fracRe), num = parseFloat(m[1]), den = parseFloat(m[2]);
      for (let q = b; q <= b + 100000; q++) {
        const v = (q * num) / den;
        if (isWhole(v)) return { price: Math.round(v), qty: q };
      }
    }
    return { price: 0, qty: 0 };
  }

  function applyCell(el, val) {
    const isErr = typeof val === 'string';
    const isZero = val === 0;
    el.dataset.raw = isErr ? '' : String(val);
    el.textContent = isErr ? val : (isZero ? '—' : val.toLocaleString());
    el.className = 'output-cell' + (isErr ? ' error' : isZero ? ' zero' : ' copyable');
  }

  /* Table UI */
  const b4 = document.getElementById('b4'), c4 = document.getElementById('c4'), d4 = document.getElementById('d4'), e4 = document.getElementById('e4');
  const body = document.getElementById('bulk-body'), roundsInput = document.getElementById('global-rounds'), sumCEl = document.getElementById('sum-c');
  const ROWS = 5;

  for (let i = 0; i < ROWS; i++) {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="name-cell"><input type="text" data-row="${i}" data-col="name"></td>
      <td class="input-cell"><input type="text" data-row="${i}" data-col="price"></td>
      <td class="input-cell"><input type="number" data-row="${i}" data-col="stock"></td>
      <td class="input-cell"><input type="number" step="any" data-row="${i}" data-col="mult"></td>
      <td><div class="output-cell zero" data-row="${i}" data-out="qty">—</div></td>
      <td><div class="output-cell zero" data-row="${i}" data-out="total">—</div></td>`;
    body.appendChild(tr);
  }

  function calcAll() {
    // T1
    const r1 = compute(b4.value, c4.value);
    applyCell(d4, r1.error || r1.price); applyCell(e4, r1.error || r1.qty);
    // T2
    const rounds = parseFloat(roundsInput.value) || 0;
    let totalC = 0;
    for (let i = 0; i < ROWS; i++) {
      const pStr = body.querySelector(`[data-row="${i}"][data-col="price"]`).value;
      const stock = parseFloat(body.querySelector(`[data-row="${i}"][data-col="stock"]`).value) || 0;
      const mult = parseFloat(body.querySelector(`[data-row="${i}"][data-col="mult"]`).value) || 1;
      const qtyEl = body.querySelector(`[data-row="${i}"][data-out="qty"]`), totalEl = body.querySelector(`[data-row="${i}"][data-out="total"]`);
      const rawQty = Math.max(0, (rounds * mult) - stock);
      if (!pStr.trim()) { applyCell(qtyEl, 0); applyCell(totalEl, 0); }
      else {
        const res = computeUp(rawQty, pStr);
        applyCell(qtyEl, res.qty); applyCell(totalEl, res.price);
        totalC += res.price;
      }
    }
    sumCEl.dataset.raw = String(totalC);
    sumCEl.textContent = totalC === 0 ? '—' : totalC.toLocaleString();
    sumCEl.className = 'sum-value' + (totalC > 0 ? ' copyable' : '');
  }

  // Sync with Firebase
  let isUpdating = false;
  function saveToFirebase() {
    if (isUpdating) return;
    const data = {
      b4: b4.value, c4: c4.value, rounds: roundsInput.value,
      rows: Array.from({length: ROWS}, (_, i) => ({
        name: body.querySelector(`[data-row="${i}"][data-col="name"]`).value,
        price: body.querySelector(`[data-row="${i}"][data-col="price"]`).value,
        stock: body.querySelector(`[data-row="${i}"][data-col="stock"]`).value,
        mult: body.querySelector(`[data-row="${i}"][data-col="mult"]`).value,
      }))
    };
    set(calRef, data);
  }

  onValue(calRef, (snap) => {
    isUpdating = true;
    const data = snap.val();
    if (data) {
      b4.value = data.b4 || ''; c4.value = data.c4 || ''; roundsInput.value = data.rounds || '';
      data.rows?.forEach((r, i) => {
        if (i < ROWS) {
          body.querySelector(`[data-row="${i}"][data-col="name"]`).value = r.name || '';
          body.querySelector(`[data-row="${i}"][data-col="price"]`).value = r.price || '';
          body.querySelector(`[data-row="${i}"][data-col="stock"]`).value = r.stock || '';
          body.querySelector(`[data-row="${i}"][data-col="mult"]`).value = r.mult || '';
        }
      });
    }
    calcAll();
    isUpdating = false;
  });

  document.addEventListener('input', saveToFirebase);
  document.addEventListener('click', e => {
    const el = e.target.closest('.copyable');
    if (el && el.dataset.raw) navigator.clipboard.writeText(el.dataset.raw);
  });
</script>
</body>
</html>
